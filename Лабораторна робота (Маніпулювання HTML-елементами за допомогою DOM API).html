<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <style>
    /* Стиль для виконаних завдань */
    .completed {
      text-decoration: line-through;
      color: gray;
      font-style: italic;
    }
    
    /* Трохи відступів для краси */
    li {
      margin-bottom: 8px;
    }
    .task-text {
      cursor: pointer;
      margin-right: 15px;
    }
  </style>
</head>
<body>

  <h2>Мій список завдань</h2>
  <input id="task-input" placeholder="Введіть нове завдання...">
  <button id="add-btn">Додати</button>
  <ul id="todo-list"></ul>

  <script>
    const todoList = document.getElementById('todo-list');
    const inputField = document.getElementById('task-input');
    const addButton = document.getElementById('add-btn');

    addButton.addEventListener('click', () => {
      const taskText = inputField.value.trim();
      if (!taskText) return; // Перевірка на порожній рядок

      // Створюємо елемент списку
      const li = document.createElement('li');

      // Створюємо елемент для тексту (щоб клікати саме по ньому)
      const span = document.createElement('span');
      span.textContent = taskText;
      span.className = 'task-text';

      // 3. Позначення виконаної задачі стилем
      span.addEventListener('click', () => {
        span.classList.toggle('completed');
      });

      // Створюємо кнопку для видалення
      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Видалити';

      // 2. Видалення існуючого завдання
      removeBtn.addEventListener('click', () => {
        todoList.removeChild(li);
      });

      // Збираємо всі елементи до купи
      li.appendChild(span);
      li.appendChild(removeBtn);
      
      // 1. Додавання нового завдання у список
      todoList.appendChild(li);
      
      // Очищуємо інпут після додавання
      inputField.value = '';
    });
  </script>

</body>
</html>
